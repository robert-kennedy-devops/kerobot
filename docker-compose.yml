services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kerobot
      POSTGRES_PASSWORD: kerobot
      POSTGRES_DB: kerobot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  kerobot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
